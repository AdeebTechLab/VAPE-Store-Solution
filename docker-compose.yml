version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: vapeshop_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=vapeshop_admin
    networks:
      - vapeshop_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vapeshop_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017
      - PORT=5000
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - vapeshop_network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vapeshop_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - vapeshop_network
    command: npm run dev

networks:
  vapeshop_network:
    driver: bridge

volumes:
  mongo_data:
